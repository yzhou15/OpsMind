# OpsMind RAG 智能运维助手 - Docker Compose 配置
# 支持内网离线部署，Ollama 服务可选

services:
  # ==================== RAG 应用服务 ====================
  opsmind-app:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    container_name: opsmind
    restart: unless-stopped

    # 安全配置：仅监听内网
    ports:
      - "127.0.0.1:8501:8501"

    environment:
      - PYTHONUNBUFFERED=1
      - HF_ENDPOINT=https://hf-mirror.com
      - HF_HOME=/models/.cache/huggingface
      - OLLAMA_BASE_URL=http://ollama:11434
      - OLLAMA_MODEL=qwen2.5:7b

    volumes:
      - opsmind-raw-data:/data/raw:ro
      - opsmind-processed-data:/data/processed
      - opsmind-chroma-db:/chroma_db
      - opsmind-models:/models/.cache/huggingface

    # Ollama 服务可选，注释掉 depends_on 以支持手动启动
    # depends_on:
    #   ollama:
    #     condition: service_healthy

    networks:
      - opsmind-network

    deploy:
      resources:
        limits:
          memory: 4G
        reservations:
          memory: 2G

    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8501/_stcore/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  # ==================== Ollama 模型服务（可选） ====================
  # 在无法访问 Docker Hub 的内网环境中，请手动部署 Ollama
  # 参考：https://ollama.com/download
  # ollama:
  #   image: ollama/ollama:latest
  #   container_name: opsmind-ollama
  #   restart: unless-stopped
  #   ports:
  #     - "127.0.0.1:11434:11434"
  #   environment:
  #     - OLLAMA_HOST=127.0.0.1:11434
  #   volumes:
  #     - ollama-models:/root/.ollama
  #   networks:
  #     - opsmind-network
  #   healthcheck:
  #     test: ["CMD", "curl", "-f", "http://localhost:11434/api/tags"]
  #     interval: 30s
  #     timeout: 10s
  #     retries: 3
  #     start_period: 120s

# ==================== 网络配置 ====================
networks:
  opsmind-network:
    driver: bridge
    ipam:
      config:
        - subnet: 172.28.0.0/16

# ==================== 数据卷配置 ====================
volumes:
  opsmind-raw-data:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: ${PWD}/../data/raw

  opsmind-processed-data:
    driver: local

  opsmind-chroma-db:
    driver: local

  opsmind-models:
    driver: local

  # ollama-models:
  #   driver: local
